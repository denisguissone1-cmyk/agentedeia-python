{% extends "base.html" %}
{% block conteudo %}
<h1>Configurações</h1>
{% if salvo %}<p class="ok">✓ Salvo com sucesso</p>{% endif %}
{% if erro %}<p class="err">{{ erro }}</p>{% endif %}
<form method="post" action="/admin/config">
  <div class="card">
    <p class="section-label">Comportamento</p>
    <div class="input-grid">
      <div><label>Buffer / debounce (s)</label><input name="buffer_segundos" type="number" value="{{ c.buffer_segundos }}"></div>
      <div><label>Bloqueio humano (min)</label><input name="bloqueio_humano_min" type="number" value="{{ c.bloqueio_humano_min }}"></div>
      <div><label>Rate limit — máx mensagens</label><input name="rate_limit_max" type="number" value="{{ c.rate_limit_max }}"></div>
      <div><label>Rate limit — janela (s)</label><input name="rate_limit_janela" type="number" value="{{ c.rate_limit_janela }}"></div>
      <div><label>Máx mensagens no histórico</label><input name="historico_max" type="number" value="{{ c.historico_max }}"></div>
      <div><label>Timeout do agente (s)</label><input name="agent_timeout_seg" type="number" value="{{ c.agent_timeout_seg }}"></div>
    </div>
  </div>
  <div class="card">
    <p class="section-label">Personalidade</p>
    <label>System prompt (Elizabeth)</label>
    <textarea name="system_prompt" style="min-height:16rem">{{ c.system_prompt }}</textarea>
  </div>
  <div class="card">
    <p class="section-label">Descrição das tools</p>
    {% for nome, desc in c.tools_descricao.items() %}
    <label>{{ nome }}</label>
    <textarea name="tool__{{ nome }}">{{ desc }}</textarea>
    {% endfor %}
  </div>
  <div class="actions">
    <button type="submit">Salvar configurações</button>
  </div>
</form>
{% endblock %}
