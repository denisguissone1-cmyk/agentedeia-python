{% extends "base.html" %}
{% block conteudo %}
<div class="sec">
  <h2>Execuções</h2>
  <span style="font-size:12.5px;color:var(--faint)">Cada mensagem processada e exatamente onde parou — clique para abrir os passos</span>
</div>
<div class="logbar" style="border:1px solid var(--line);border-radius:10px;margin-bottom:12px">
  <span class="lv" style="color:var(--grn)"><span class="dot" style="background:var(--grn);box-shadow:0 0 0 3px rgba(18,161,80,.16)"></span>Ao vivo</span>
  <span style="margin-left:auto;font-size:12px;color:var(--faint)">atualiza a cada 4s</span>
</div>
<div id="execs"><div style="padding:2rem;text-align:center;color:var(--faint)">Carregando…</div></div>

<style>
.exec{border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;background:#fff}
.exec-h{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer}
.exec-h:hover{background:#FBFBFC}
.exec-dot{width:9px;height:9px;border-radius:50%;flex:none}
.exec-num{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600;color:var(--ink);flex:none}
.exec-res{flex:1;font-size:13px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exec-st{font-size:11px;font-weight:600;padding:3px 9px;border-radius:999px;text-transform:capitalize;flex:none}
.exec-hora{font-size:11.5px;color:var(--faint);font-family:'JetBrains Mono',monospace;flex:none}
.exec .chev{color:var(--faint);transition:.15s;flex:none}
.exec.open .chev{transform:rotate(90deg)}
.exec-b{display:none;border-top:1px solid var(--line2);padding:6px 0;background:#FCFCFD}
.exec.open .exec-b{display:block}
.step{display:flex;align-items:baseline;gap:10px;padding:7px 16px;font-size:12.5px}
.step-ic{font-weight:700;flex:none;width:14px;text-align:center}
.step-nome{font-weight:600;color:var(--ink);min-width:210px;flex:none}
.step-det{flex:1;color:var(--mut);word-break:break-word}
.step-hora{color:var(--faint);font-family:'JetBrains Mono',monospace;font-size:11px;flex:none}
@media(max-width:680px){.step{flex-wrap:wrap}.step-nome{min-width:0}}
</style>
{% endblock %}

{% block scripts %}
<script>
const ST_COR = { sucesso:'#12A150', falha:'#E5484D', ignorada:'#969CA8', aguardando:'#D98A0B', andamento:'#2D7FF9' };

function render(dados){
  const cont = document.getElementById('execs');
  if(!dados.length){
    cont.innerHTML = '<div style="padding:2.5rem;text-align:center;color:var(--faint)">Nenhuma execução ainda. Mande uma mensagem no WhatsApp para ver o passo a passo aqui.</div>';
    return;
  }
  const abertos = new Set([...cont.querySelectorAll('.exec.open')].map(e=>e.dataset.id));
  cont.innerHTML = '';
  for(const ex of dados){
    const cor = ST_COR[ex.status] || '#5C6470';
    const card = document.createElement('div');
    card.className = 'exec' + (abertos.has(ex.req_id) ? ' open' : '');
    card.dataset.id = ex.req_id;

    const head = document.createElement('div');
    head.className = 'exec-h';
    head.innerHTML = '<span class="exec-dot"></span><span class="exec-num"></span><span class="exec-res"></span><span class="exec-st"></span><span class="exec-hora"></span><span class="chev">›</span>';
    head.querySelector('.exec-dot').style.background = cor;
    head.querySelector('.exec-num').textContent = ex.numero;
    head.querySelector('.exec-res').textContent = ex.resumo || '';
    const st = head.querySelector('.exec-st');
    st.textContent = ex.status;
    st.style.color = cor; st.style.background = cor + '1f';
    head.querySelector('.exec-hora').textContent = ex.hora;
    head.onclick = () => card.classList.toggle('open');

    const body = document.createElement('div');
    body.className = 'exec-b';
    for(const p of (ex.passos || [])){
      const erro = p.status === 'erro';
      const row = document.createElement('div');
      row.className = 'step';
      if(erro) row.style.background = 'var(--red-soft)';
      row.innerHTML = '<span class="step-ic"></span><span class="step-nome"></span><span class="step-det"></span><span class="step-hora"></span>';
      const ic = row.querySelector('.step-ic');
      ic.textContent = erro ? '✕' : '✓';
      ic.style.color = erro ? '#E5484D' : '#12A150';
      row.querySelector('.step-nome').textContent = p.nome;       // textContent: seguro contra HTML
      row.querySelector('.step-det').textContent = p.detalhe || '';
      row.querySelector('.step-hora').textContent = p.hora;
      body.appendChild(row);
    }
    card.appendChild(head);
    card.appendChild(body);
    cont.appendChild(card);
  }
}

async function carregar(){
  try{
    const r = await fetch('/admin/execucoes/dados', {cache:'no-store'});
    if(r.ok) render(await r.json());
  }catch(_){}
}
carregar();
setInterval(carregar, 4000);
</script>
{% endblock %}
