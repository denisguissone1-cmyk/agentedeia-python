{% extends "base.html" %}
{% block conteudo %}
<div style="display:flex;align-items:center;gap:14px;margin:4px 2px 16px;flex-wrap:wrap">
  <a class="btn" href="/admin/sessoes" style="padding:6px 12px">← Sessões</a>
  <h2 style="font-family:'JetBrains Mono',monospace;font-size:15px;margin:0;flex:1">{{ numero.split('@')[0] }}</h2>
  <div style="display:flex;gap:8px">
    <form method="post" action="/admin/sessoes/{{ numero }}/pausar" style="margin:0">
      <button type="submit" class="btn">Pausar bot</button>
    </form>
    <form method="post" action="/admin/sessoes/{{ numero }}/despausar" style="margin:0">
      <button type="submit" class="btn btn-pri">Despausar</button>
    </form>
  </div>
</div>
<div class="card" style="overflow:hidden">
  {% for m in mensagens %}
  <div style="display:flex;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line2)">
    <span style="font-size:11.5px;font-weight:600;min-width:78px;padding-top:1px;color:{% if m.ag %}var(--acc){% else %}var(--faint){% endif %}">{{ m.role }}</span>
    <span style="font-size:13px;color:var(--mut);white-space:pre-wrap;word-break:break-word;line-height:1.55">{{ m.texto }}</span>
  </div>
  {% else %}
  <div class="empty">Nenhuma mensagem ainda</div>
  {% endfor %}
</div>
{% endblock %}
