{% extends "base.html" %}
{% block conteudo %}
<h1>Sessões</h1>
<div class="card" style="padding:0;overflow:hidden">
  <table>
    <thead>
      <tr><th>Número</th><th>Nome</th><th>Status</th><th></th></tr>
    </thead>
    <tbody>
      {% for s in sessoes %}
      <tr>
        <td style="font-family:monospace;font-size:12px;color:var(--g900)">{{ s.numero.split('@')[0] }}</td>
        <td>{{ s.nome or '—' }}</td>
        <td>
          {% if s.status == 'ativo' %}<span class="badge badge-green">ativo</span>
          {% else %}<span class="badge badge-gray">{{ s.status }}</span>{% endif %}
        </td>
        <td style="text-align:right"><a href="/admin/sessoes/{{ s.numero }}" class="btn btn-ghost btn-sm">Abrir →</a></td>
      </tr>
      {% else %}
      <tr><td colspan="4" style="text-align:center;color:var(--g400);padding:2.5rem;font-size:13px">Nenhuma sessão registrada ainda</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
