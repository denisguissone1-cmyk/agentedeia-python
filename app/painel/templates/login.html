{% extends "base.html" %}
{% block conteudo %}
<div style="max-width:360px;margin:4rem auto">
  <h1 style="text-align:center;margin-bottom:.25rem">Elizabeth</h1>
  <p style="text-align:center;color:var(--g400);font-size:13px;margin-bottom:2rem">Painel de administração</p>
  {% if erro %}<p class="err">{{ erro }}</p>{% endif %}
  <div class="card">
    <form method="post" action="/admin/login">
      <label>Usuário</label>
      <input name="usuario" autofocus autocomplete="username">
      <label>Senha</label>
      <input name="senha" type="password" autocomplete="current-password">
      <div class="actions" style="margin-top:1rem">
        <button type="submit" style="width:100%;justify-content:center">Entrar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
