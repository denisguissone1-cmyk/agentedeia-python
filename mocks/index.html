<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel v2 · Mocks da Home</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0B0E14;color:#E6EDF6;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:18px;padding:11px 18px;border-bottom:1px solid #1C2433;background:#0D121B;flex:none}
header .t{font-size:13px;font-weight:600;letter-spacing:-.02em;margin-right:6px}
header .t span{color:#5A6678;font-weight:400}
.tabs{display:flex;gap:6px}
.tab{padding:7px 14px;border-radius:8px;font-size:12.5px;font-weight:600;color:#8B98AB;background:transparent;border:1px solid transparent;cursor:pointer;transition:.12s;display:flex;flex-direction:column;gap:1px;line-height:1.25}
.tab small{font-size:10.5px;font-weight:500;color:#5A6678}
.tab:hover{background:#141B27;color:#E6EDF6}
.tab.on{background:rgba(56,189,248,.12);color:#38BDF8;border-color:rgba(56,189,248,.3)}
.tab.on small{color:#38BDF8;opacity:.7}
.hint{margin-left:auto;font-size:11.5px;color:#5A6678}
.hint b{color:#34D399}
.frame{flex:1;border:0;width:100%;background:#fff}
</style>
</head>
<body>
<header>
  <div class="t">Painel v2 <span>· escolha a direção da home</span></div>
  <div class="tabs">
    <button class="tab on" data-src="dashboard-a-mercury.html">A<small>Mercury</small></button>
    <button class="tab" data-src="dashboard-b-console.html">B<small>Dark Console</small></button>
    <button class="tab" data-src="dashboard-c-soft.html">C<small>Soft SaaS</small></button>
    <button class="tab" data-src="dashboard-d-compact.html">D<small>Compact Pro</small></button>
  </div>
  <div class="hint">clique nas abas pra alternar · <b>●</b> dados fictícios</div>
</header>
<iframe class="frame" id="f" src="dashboard-a-mercury.html"></iframe>
<script>
const f=document.getElementById('f');
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');f.src=t.dataset.src;
}));
</script>
</body>
</html>
