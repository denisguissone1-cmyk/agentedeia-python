services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      POSTGRES_CONN: postgresql://elizabeth:elizabeth@postgres:5432/elizabeth
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: elizabeth
      POSTGRES_PASSWORD: elizabeth
      POSTGRES_DB: elizabeth
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped

  # HTTPS opcional (descomente e ajuste o domínio):
  # caddy:
  #   image: caddy:2
  #   ports: ["80:80", "443:443"]
  #   command: caddy reverse-proxy --from seu-dominio.com --to app:8000
  #   depends_on: [app]
  #   restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
