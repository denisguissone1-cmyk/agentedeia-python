services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

  # HTTPS opcional (descomente e ajuste o domínio):
  # caddy:
  #   image: caddy:2
  #   ports: ["80:80", "443:443"]
  #   command: caddy reverse-proxy --from seu-dominio.com --to app:8000
  #   depends_on: [app]
  #   restart: unless-stopped

volumes:
  redis-data:
